name: Get Google Scholar data

on:
  # Auto-triggers disabled: the live citation badge now reads directly from
  # the Semantic Scholar API via shields.io, so this crawler is no longer
  # part of the badge pipeline. Kept around (manual-only) so we can still
  # snapshot the full Google Scholar profile to `gs_data.json` on demand.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          cd google_scholar_crawler
          pip install -r requirements.txt

      - name: Run crawler
        timeout-minutes: 15
        env:
          GOOGLE_SCHOLAR_ID: QgMkYFAAAAAJ
        run: |
          cd google_scholar_crawler
          python main.py

      - name: Push results to google-scholar-stats branch
        run: |
          cd google_scholar_crawler/results
          git init -b google-scholar-stats
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gs_data.json gs_data_shieldsio.json
          git commit -m "Update Google Scholar data"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" google-scholar-stats:google-scholar-stats
